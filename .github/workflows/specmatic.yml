name: Specmatic Contract Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  contract-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Start FastAPI Backend
        run: |
          cd backend
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 10

      - name: Pull Specmatic Image
        run: |
          docker pull specmatic/enterprise:latest

      - name: Validate OpenAPI Contract
        run: |
          docker run --rm \
          -v ${{ github.workspace }}:/usr/src/app \
          specmatic/enterprise:latest \
          validate --spec-file=contracts/interview-api.yaml

      - name: Run Contract Tests
        run: |
          docker run --rm \
          -v ${{ github.workspace }}:/usr/src/app \
          specmatic/enterprise:latest \
          test contracts/interview-api.yaml \
          --testBaseURL=http://host.docker.internal:8000