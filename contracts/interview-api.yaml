openapi: 3.0.0

info:
  title: AI Interview Assistant API
  version: 1.0.0

paths:
  /generate-questions:
    post:
      summary: Generate interview questions

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              properties:
                role:
                  type: string
            examples:
              interview_flow:
                value:
                  role: "Machine Learning Engineer"

      responses:
        "200":
          description: Questions generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  questions:
                    type: array
                    items:
                      type: string
              examples:
                interview_flow:
                  value:
                    questions:
                      - "What is supervised learning?"
                      - "Explain overfitting."
                      - "What is feature engineering?"

  /evaluate-answer:
    post:
      summary: Evaluate interview answer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - question
                - answer
              properties:
                question:
                  type: string
                answer:
                  type: string
            examples:
              answer_review:
                value:
                  question: "What is supervised learning?"
                  answer: "A machine learning technique where models learn from labeled data."

      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  score:
                    type: integer
                  feedback:
                    type: string
              examples:
                answer_review:
                  value:
                    score: 8
                    feedback: "Good technical explanation."