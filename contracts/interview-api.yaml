openapi: 3.0.0

info:
  title: AI Interview Assistant API
  version: 1.0.0
  description: Contract-Governed AI Interview Assistant API

paths:
  /generate-questions:
    post:
      summary: Generate interview questions

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              additionalProperties: false
              properties:
                role:
                  type: string
                  minLength: 2
                  maxLength: 100

      responses:
        "200":
          description: Questions generated successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - questions
                additionalProperties: false
                properties:
                  questions:
                    type: array
                    minItems: 1
                    items:
                      type: string
                      minLength: 5

        "422":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                required:
                  - detail
                properties:
                  detail:
                    type: array
                    items:
                      type: object

  /evaluate-answer:
    post:
      summary: Evaluate interview answer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - question
                - answer
              additionalProperties: false
              properties:
                question:
                  type: string
                  minLength: 5

                answer:
                  type: string
                  minLength: 10

      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema:
                type: object
                required:
                  - score
                  - feedback
                additionalProperties: false
                properties:
                  score:
                    type: integer
                    minimum: 0
                    maximum: 10

                  feedback:
                    type: string
                    minLength: 5

        "422":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                required:
                  - detail
                properties:
                  detail:
                    type: array
                    items:
                      type: object