openapi: 3.0.0

info:
  title: AI Interview Assistant API
  version: 1.0.0
  description: Contract-Governed AI Interview Assistant API

paths:
  /generate-questions:
    post:
      summary: Generate interview questions

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              additionalProperties: false
              properties:
                role:
                  type: string
                  minLength: 2
                  maxLength: 100

            examples:
              interview_flow:
                value:
                  role: "Machine Learning Engineer"

              invalid_role:
                value:
                  role: ""

      responses:
        "200":
          description: Questions generated successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - questions
                additionalProperties: false
                properties:
                  questions:
                    type: array
                    minItems: 1
                    items:
                      type: string
                      minLength: 5

              examples:
                interview_flow:
                  value:
                    questions:
                      - "What is supervised learning?"
                      - "Explain overfitting."
                      - "What is feature engineering?"

        "422":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                required:
                  - detail
                properties:
                  detail:
                    type: array
                    items:
                      type: object

              examples:
                invalid_role:
                  value:
                    detail:
                      - type: "string_too_short"
                        loc:
                          - body
                          - role
                        msg: "String should have at least 2 characters"
                        input: ""
                        ctx:
                          min_length: 2

  /evaluate-answer:
    post:
      summary: Evaluate interview answer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - question
                - answer
              additionalProperties: false
              properties:
                question:
                  type: string
                  minLength: 5

                answer:
                  type: string
                  minLength: 10

            examples:
              answer_review:
                value:
                  question: "What is supervised learning?"
                  answer: "A machine learning technique where models learn from labeled data."

              invalid_answer:
                value:
                  question: "What is supervised learning?"
                  answer: ""

      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema:
                type: object
                required:
                  - score
                  - feedback
                additionalProperties: false
                properties:
                  score:
                    type: integer
                    minimum: 0
                    maximum: 10

                  feedback:
                    type: string
                    minLength: 5

              examples:
                answer_review:
                  value:
                    score: 8
                    feedback: "Good technical explanation with relevant examples."

        "422":
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                required:
                  - detail
                properties:
                  detail:
                    type: array
                    items:
                      type: object

              examples:
                invalid_answer:
                  value:
                    detail:
                      - type: "string_too_short"
                        loc:
                          - body
                          - answer
                        msg: "String should have at least 10 characters"
                        input: ""
                        ctx:
                          min_length: 10