openapi: 3.0.0

info:
  title: AI Interview Assistant API
  version: 1.0.0

paths:
  /generate-questions:
    post:
      summary: Generate interview questions

      requestBody:
        required: true

        content:
          application/json:
            schema:
              type: object

              required:
                - role

              properties:
                role:
                  type: string

      responses:
        '200':
          description: Questions generated

          content:
            application/json:
              schema:
                type: object

                properties:
                  questions:
                    type: array

                    items:
                      type: string